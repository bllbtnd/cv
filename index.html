<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F0EBE3">
    <title>CV — Balla Botond</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            overflow-x: hidden;
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0b0b0f 0%, #1a1a20 50%, #0b0b0f 100%);
            color: #F0EBE3;
            padding: 2rem;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(229, 226, 220, 0.2);
            padding-bottom: 2rem;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-info h1 {
            font-family: 'Instrument Serif', Georgia, serif;
            font-size: clamp(1.75rem, 1rem + 3vw, 3rem);
            font-weight: 400;
            letter-spacing: -0.02em;
            line-height: 1.2;
            color: #F0EBE3;
            margin-bottom: 0.5rem;
        }

        .header-info p {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.875rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #B8B2A8;
        }

        .buttons {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        button {
            padding: 0.75rem 1.5rem;
            background: rgba(201, 169, 107, 0.12);
            border: 0.5px solid rgba(201, 169, 107, 0.3);
            color: #c9a96b;
            border-radius: 0.5rem;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        button:hover {
            background: rgba(201, 169, 107, 0.2);
            border-color: rgba(201, 169, 107, 0.5);
            color: #e8c474;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 1rem;
            padding: 0.875rem 1.25rem;
            border-radius: 0.5rem;
            display: none;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.875rem;
            letter-spacing: 0.05em;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .status.error {
            background: rgba(196, 96, 90, 0.15);
            color: #e08878;
            border: 0.5px solid rgba(196, 96, 90, 0.3);
        }

        .status.success {
            background: rgba(91, 168, 122, 0.15);
            color: #7ec99f;
            border: 0.5px solid rgba(91, 168, 122, 0.3);
        }

        .iframe-container {
            background: rgba(26, 26, 26, 0.6);
            border: 0.5px solid rgba(229, 226, 220, 0.1);
            border-radius: 0.75rem;
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0.5px 0 rgba(255, 255, 255, 0.05);
            max-width: 794px;
            margin: 0 auto;
        }

        iframe {
            width: 100%;
            height: 297mm;
            border: none;
            display: block;
            background: #F0EBE3;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .header {
                margin-bottom: 1.5rem;
                padding-bottom: 1.5rem;
            }

            .header-top {
                flex-direction: column;
            }

            .buttons {
                width: 100%;
                justify-content: flex-start;
            }

            button {
                flex: 1;
                min-width: 140px;
            }

            iframe {
                height: 80vh;
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-0.5rem);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <div class="header-info">
                    <h1>CV</h1>
                    <p>Balla Botond</p>
                </div>
                <div class="buttons">
                    <button onclick="downloadPDF()" title="Download as PDF">
                        <i class="fas fa-file-pdf"></i> PDF
                    </button>
                    <button onclick="downloadHTML()" title="Download as HTML">
                        <i class="fas fa-code"></i> HTML
                    </button>
                </div>
            </div>
            <div id="status" class="status"></div>
        </div>

        <div class="iframe-container">
            <iframe id="cvFrame" src="cv.html"></iframe>
        </div>
    </div>

    <script>
        const CV_HTML = 'cv.html';
        const CV_PDF = 'cv.pdf';

        function showStatus(msg, isError = false) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + (isError ? 'error' : 'success');
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function downloadPDF() {
            const link = document.createElement('a');
            link.href = CV_PDF;
            link.download = 'CV_Balla_Botond.pdf';
            link.click();
            showStatus('✓ CV_Balla_Botond.pdf downloaded');
        }

        function downloadHTML() {
            const link = document.createElement('a');
            link.href = CV_HTML;
            link.download = 'CV_Balla_Botond.html';
            link.click();
            showStatus('✓ CV_Balla_Botond.html downloaded');
        }

        // Check if files exist on load
        window.addEventListener('load', () => {
            Promise.all([
                fetch(CV_HTML).then(r => r.ok || Promise.reject('cv.html')),
                fetch(CV_PDF).then(r => r.ok || Promise.reject('cv.pdf'))
            ]).catch(missing => {
                showStatus(`⚠ ${missing} not found in repo`, true);
            });
        });
    </script>
</body>
</html>
